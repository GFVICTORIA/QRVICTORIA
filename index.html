<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GF Victoria - Guest Experience</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:"Times New Roman", serif;
    background-image:url("fondo qr3.jpg");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    min-height:100vh;
    height:100dvh;
    overflow:hidden;
    color:white;
}

/* FONDO MOVIL */

@media(max-width:768px){

body{
    background-image:url("fondo-mobile.jpg");
    background-size:contain;
    background-repeat:no-repeat;
    background-position:center top;
    background-color:black;
}

h1{
    font-size:32px;
}

button{
    font-size:18px;
    padding:14px;
}

.top-btn{
    font-size:12px;
    padding:8px 12px;
}

.arrow{
    width:45px;
    height:45px;
    font-size:28px;
}

}

/* OVERLAY */

.overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.45);
    z-index:1;
}

/* PANTALLAS */

.screen{
    position:relative;
    z-index:2;
    width:100%;
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:flex-start;
    align-items:center;
    padding:30px;
    padding-top:120px;
    overflow-y:auto;
}

.hidden{
    display:none;
}
.viewer-container.active{
    display:flex;
}

/* TITULOS */

h1{
    font-size:46px;
    font-style:italic;
    margin-bottom:50px;
    text-align:center;
    text-shadow:0 3px 12px rgba(0,0,0,0.5);
}

/* MENUS */

.menu{
    width:100%;
    max-width:560px;
    display:flex;
    flex-direction:column;
    gap:18px;
}

/* BOTONES */

button{
    padding:16px 20px;
    border:none;
    border-radius:16px;
    background:rgba(0,0,0,0.65);
    color:white;
    font-size:22px;
    cursor:pointer;
    transition:0.3s;
    backdrop-filter:blur(5px);
}

button:hover{
    background:rgba(0,0,0,0.85);
    transform:scale(1.02);
}

/* BOTON VOLVER */

.back-btn{
    background:#a0002c;
}

/* VISOR */

.viewer-container{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.96);
    display:none;
    z-index:100;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

.viewer-image{
    width:100%;
    height:100%;
    object-fit:contain;
}

/* MENU SUPERIOR */

.top-bar{
    position:absolute;
    top:15px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    justify-content:center;
    z-index:10;
    width:95%;
}

/* BOTONES SUPERIORES */

.top-btn{
    padding:10px 16px;
    border:none;
    border-radius:30px;
    background:rgba(0,0,0,0.72);
    color:white;
    cursor:pointer;
    font-size:15px;
    backdrop-filter:blur(4px);
}

.top-btn.active{
    background:#a0002c;
}

/* BOTON CERRAR */

.close-btn{
    position:absolute;
    top:20px;
    right:20px;
    z-index:20;
    background:#a0002c;
    border:none;
    color:white;
    padding:12px 18px;
    border-radius:12px;
    cursor:pointer;
    font-size:16px;
}

/* FLECHAS */

.arrow{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    z-index:15;
    font-size:42px;
    color:white;
    background:rgba(0,0,0,0.5);
    width:60px;
    height:60px;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    cursor:pointer;
    user-select:none;
}

.arrow-left{
    left:20px;
}

.arrow-right{
    right:20px;
}

</style>
</head>

<body>

<div class="overlay"></div>

<!-- IDIOMAS -->

<div class="screen" id="languageScreen">

<h1>Select Language / Selecciona idioma</h1>

<div class="menu">

<button onclick="showMainMenu('es')">ESPAÑOL</button>
<button onclick="showMainMenu('en')">ENGLISH</button>

</div>

</div>

<!-- MENU PRINCIPAL -->

<div class="screen hidden" id="mainMenuScreen">

<h1 id="mainTitle"></h1>

<div class="menu" id="mainMenu"></div>

</div>

<!-- SUBMENU -->

<div class="screen hidden" id="subMenuScreen">

<h1 id="subTitle"></h1>

<div class="menu" id="subMenu"></div>

</div>

<!-- VISOR -->

<div class="viewer-container hidden" id="viewerContainer">

<div class="top-bar" id="imageNav"></div>

<button class="close-btn" onclick="closeViewer()">✕</button>

<div class="arrow arrow-left" onclick="prevImage()">‹</div>

<img class="viewer-image" id="viewerImage">

<div class="arrow arrow-right" onclick="nextImage()">›</div>

</div>

<script>

/* VARIABLES */

let currentLang = "es";
let currentGroup = [];
let currentIndex = 0;
let openedFromSubmenu = false;

let currentMultiImages = null;
let currentMultiIndex = 0;

/* CONTENIDO */

const content = {

es: {

mainTitle:"Seleccione una opción",

main:[

{name:"Excursiones", action:"excursiones"},
{name:"Traslados", image:"traslado.jpg"},
{name:"Complementos de estancia", action:"extras"},
{name:"Rent a car", image:"alquiler.jpg"}

],

excursiones:[

{name:"Lo más vendido del mes", image:"mas-vendido.jpg"},
{name:"Información general", image:"general esp.jpg"},
{name:"Barcos", image:"barco.jpg"},
{name:"Actividades en el agua", image:"agua.jpg"},
{name:"Actividades terrestres", image:"terrestre.jpg"},
{name:"Fondos Marinos", image:"marinos.jpg"},
{name:"Cielos", image:"cielos.jpg"},
{name:"Para toda la familia", image:"familia.jpg"},
{name:"Espectáculos", image:"espectaculos.jpg"}

],

extras:[

{
name:"Paquete de Cumpleaños",
images:[
"cumpleaños_page-0001.jpg",
"cumpleaños_page-0002.jpg"
"cumpleaños_page-0003.jpg"
]
},

{
name:"Paquete Romántico",
images:[
"romantico_page-0001.jpg",
"romantico_page-0002.jpg",
"romantico_page-0003.jpg"
"romantico_page-0004.jpg"
"romantico_page-0005.jpg"
]
},

{name:"Accesorios de bebé", image:"bebe.jpg"}

]

},

en: {

mainTitle:"Select an option",

main:[

{name:"Excursions", action:"excursiones"},
{name:"Transfers", image:"TRANSFER ING.jpg"},
{name:"Stay Complements", action:"extras"},
{name:"Rent a car", image:"RENT.jpg"}

],

excursiones:[

{name:"Best Sellers", image:"best.jpg"},
{name:"General Information", image:"general ing.jpg"},
{name:"Boats", image:"BOAT.jpg"},
{name:"Water Activities", image:"WATER.jpg"},
{name:"Land Activities", image:"LAND.jpg"},
{name:"Marine Experiences", image:"MARINE.jpg"},
{name:"Sky", image:"SKY.jpg"},
{name:"For the whole family", image:"FAMILY.jpg"},
{name:"Shows", image:"SHOW.jpg"}

],

extras:[

{
name:"Birthday Package",
images:[
"BIRTHDAY_page-0001.jpg",
"BIRTHDAY_page-0002.jpg"
"BIRTHDAY_page-0003.jpg"
]
},

{
name:"Romantic Package",
images:[
"ROMANTIC_page-0001.jpg",
"ROMANTIC_page-0002.jpg",
"ROMANTIC_page-0003.jpg"
"ROMANTIC_page-0004.jpg"
"ROMANTIC_page-0005.jpg"
]
},

{name:"Baby Accessories", image:"BABY.jpg"}

]

}

};

/* MENU PRINCIPAL */

function showMainMenu(lang){

currentLang = lang;

document.getElementById("languageScreen").classList.add("hidden");

document.getElementById("mainMenuScreen").classList.remove("hidden");

document.getElementById("mainTitle").innerText =
content[lang].mainTitle;

const menu = document.getElementById("mainMenu");

menu.innerHTML = "";

content[lang].main.forEach(item=>{

const btn = document.createElement("button");

btn.innerText = item.name;

if(item.image || item.images){

btn.onclick = ()=>{

openedFromSubmenu = false;

openViewer(
[{name:item.name,image:item.image,images:item.images}],
0
);

};

}else{

btn.onclick = ()=>showSubMenu(item.action);

}

menu.appendChild(btn);

});

const back = document.createElement("button");

back.className = "back-btn";

back.innerText = lang==="es" ? "← Volver" : "← Back";

back.onclick = ()=>{

document.getElementById("mainMenuScreen").classList.add("hidden");

document.getElementById("languageScreen").classList.remove("hidden");

};

menu.appendChild(back);

}

/* SUBMENU */

function showSubMenu(type){

document.getElementById("mainMenuScreen").classList.add("hidden");

document.getElementById("subMenuScreen").classList.remove("hidden");

document.getElementById("subTitle").innerText =
type==="excursiones"
? (currentLang==="es" ? "Excursiones" : "Excursions")
: (currentLang==="es" ? "Complementos" : "Complements");

const sub = document.getElementById("subMenu");

sub.innerHTML = "";

content[currentLang][type].forEach((item,index)=>{

const btn = document.createElement("button");

btn.innerText = item.name;

btn.onclick = ()=>{

openedFromSubmenu = true;

openViewer(
content[currentLang][type],
index
);

};

sub.appendChild(btn);

});

const back = document.createElement("button");

back.className = "back-btn";

back.innerText = currentLang==="es"
? "← Volver"
: "← Back";

back.onclick = ()=>{

document.getElementById("subMenuScreen").classList.add("hidden");

document.getElementById("mainMenuScreen").classList.remove("hidden");

};

sub.appendChild(back);

}

/* ABRIR VISOR */

function openViewer(group,index){

currentGroup = group;
currentIndex = index;

document.getElementById("viewerContainer").classList.add("active");

loadImage();

}

/* CARGAR IMAGEN */

function loadImage(){

const currentItem = currentGroup[currentIndex];

const viewer = document.getElementById("viewerImage");

/* VARIAS PAGINAS */

if(currentItem.images){

viewer.src = currentItem.images[0];

currentMultiImages = currentItem.images;

currentMultiIndex = 0;

}else{

viewer.src = currentItem.image;

currentMultiImages = null;

}

/* MENU SUPERIOR */

const nav = document.getElementById("imageNav");

nav.innerHTML = "";

currentGroup.forEach((item,index)=>{

const btn = document.createElement("button");

btn.className = "top-btn";

if(index===currentIndex){

btn.classList.add("active");

}

btn.innerText = item.name;

btn.onclick = ()=>{

currentIndex = index;

loadImage();

};

nav.appendChild(btn);

});

}

/* SIGUIENTE */

function nextImage(){

if(currentMultiImages){

if(currentMultiIndex < currentMultiImages.length-1){

currentMultiIndex++;

document.getElementById("viewerImage").src =
currentMultiImages[currentMultiIndex];

return;

}

}

if(currentIndex < currentGroup.length-1){

currentIndex++;

loadImage();

}

}

/* ANTERIOR */

function prevImage(){

if(currentMultiImages){

if(currentMultiIndex > 0){

currentMultiIndex--;

document.getElementById("viewerImage").src =
currentMultiImages[currentMultiIndex];

return;

}

}

if(currentIndex > 0){

currentIndex--;

loadImage();

}

}

/* CERRAR */

function closeViewer(){

document.getElementById("viewerContainer").classList.remove("active");

if(openedFromSubmenu){

document.getElementById("subMenuScreen").classList.remove("hidden");

}else{

document.getElementById("mainMenuScreen").classList.remove("hidden");

}

}

/* SWIPE MOVIL */

let startX = 0;

document.addEventListener("touchstart",e=>{

startX = e.touches[0].clientX;

});

document.addEventListener("touchend",e=>{

let endX = e.changedTouches[0].clientX;

if(Math.abs(startX-endX)>70){

if(endX < startX){

nextImage();

}else{

prevImage();

}

}

});

</script>

</body>
</html>
